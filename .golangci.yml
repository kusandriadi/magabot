version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - misspell
  settings:
    govet:
      enable-all: false
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
