version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - bodyclose
    - misspell
    - gofmt
  disable:
    - gosec # Run separately in CI security job
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      enable-all: false
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    - format: colored-line-number
