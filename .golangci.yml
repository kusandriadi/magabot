version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - misspell
  disable:
    - gosec
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      enable-all: false
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
