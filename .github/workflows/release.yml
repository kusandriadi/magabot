name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-windows:
    name: Build (Linux + Windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compilers
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X github.com/kusa/magabot/internal/version.Version=${VERSION} -X github.com/kusa/magabot/internal/version.GitCommit=${GIT_COMMIT} -X github.com/kusa/magabot/internal/version.BuildTime=${BUILD_TIME}"

          GOOS=linux   GOARCH=amd64 CGO_ENABLED=1 CC=gcc                    go build -ldflags="${LDFLAGS}" -o magabot_linux_amd64         ./cmd/magabot
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc  go build -ldflags="${LDFLAGS}" -o magabot_linux_arm64         ./cmd/magabot
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc go build -ldflags="${LDFLAGS}" -o magabot_windows_amd64.exe   ./cmd/magabot

      - name: Package and checksum
        run: |
          sha256sum magabot_linux_amd64       > magabot_linux_amd64.sha256
          sha256sum magabot_linux_arm64       > magabot_linux_arm64.sha256
          sha256sum magabot_windows_amd64.exe > magabot_windows_amd64.sha256
          cp magabot_linux_amd64   magabot && tar -czf magabot_linux_amd64.tar.gz   magabot && rm magabot
          cp magabot_linux_arm64   magabot && tar -czf magabot_linux_arm64.tar.gz   magabot && rm magabot
          cp magabot_windows_amd64.exe magabot.exe && zip magabot_windows_amd64.zip magabot.exe && rm magabot.exe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: |
            magabot_linux_*.tar.gz
            magabot_linux_*.sha256
            magabot_windows_*.zip
            magabot_windows_*.sha256

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X github.com/kusa/magabot/internal/version.Version=${VERSION} -X github.com/kusa/magabot/internal/version.GitCommit=${GIT_COMMIT} -X github.com/kusa/magabot/internal/version.BuildTime=${BUILD_TIME}"

          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 CC=clang go build -ldflags="${LDFLAGS}" -o magabot_darwin_amd64 ./cmd/magabot
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 CC=clang go build -ldflags="${LDFLAGS}" -o magabot_darwin_arm64 ./cmd/magabot

      - name: Package and checksum
        run: |
          shasum -a 256 magabot_darwin_amd64 > magabot_darwin_amd64.sha256
          shasum -a 256 magabot_darwin_arm64 > magabot_darwin_arm64.sha256
          cp magabot_darwin_amd64 magabot && tar -czf magabot_darwin_amd64.tar.gz magabot && rm magabot
          cp magabot_darwin_arm64 magabot && tar -czf magabot_darwin_arm64.tar.gz magabot && rm magabot

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            magabot_darwin_*.tar.gz
            magabot_darwin_*.sha256

  release:
    name: Create Release
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            magabot_*.tar.gz
            magabot_*.zip
            magabot_*.sha256
