# Magabot Configuration
# Platform-specific configs: configs/platforms/<name>/config.example.yaml
# LLM config: configs/llm/config.example.yaml

# Security
security:
  # Encryption key (32 bytes, base64) - generate with: ./magabot -genkey
  encryption_key: ""
  
  # Allowed users per platform (empty = allow all for setup)
  allowed_users:
    telegram: []
    # telegram: ["287676843"]
    whatsapp: []
    slack: []
  
  rate_limit:
    messages_per_minute: 30
    commands_per_minute: 10

# Platforms
platforms:
  telegram:
    enabled: true
    bot_token: ""  # From @BotFather
    
  whatsapp:
    enabled: false
    
  slack:
    enabled: false
    bot_token: ""   # xoxb-...
    app_token: ""   # xapp-...
    signing_secret: ""
    
  webhook:
    enabled: false
    port: 8080
    path: "/webhook"
    bind: "127.0.0.1"
    auth_method: "bearer"  # none, bearer, basic, hmac
    bearer_token: ""
    hmac_secret: ""
    allowed_ips: []

# Paths - Directory structure
paths:
  data_dir: ~/.magabot/data           # Base data directory
  logs_dir: ~/.magabot/data/logs      # Log files
  memory_dir: ~/.magabot/data/memory  # RAG/memory storage
  cache_dir: ~/.magabot/data/cache    # Temporary cache
  exports_dir: ~/.magabot/data/exports    # User exports
  downloads_dir: ~/.magabot/data/downloads # Bot downloads

# Skills - Plugin system
skills:
  dir: ~/code/magabot-skills  # Skills directory (can be git repo)
  auto_reload: true           # Watch for changes and reload

# Storage
storage:
  database: ""  # Default: ~/.magabot/data/db/magabot.db
  history_retention: 90  # days, 0 = forever
  backup:
    enabled: true
    path: ""  # Default: ~/.magabot/data/backups
    keep_count: 10
    auto_interval: 24  # hours, 0 = disabled

# Logging
logging:
  level: "info"  # debug, info, warn, error
  file: "data/magabot.log"
  redact_messages: true

# Session settings
session:
  max_history: 200  # max messages per session (user + assistant combined)

# Personas - AI personality profiles (switch with /persona command)
personas:
  default: assistant
  list:
    - name: assistant
      description: "A friendly and versatile general assistant"
      personality: "helpful, friendly, concise, adaptive"
      system_prompt: |
        You are a helpful and friendly AI assistant.
        Reply concisely and clearly.
        Always respond in the same language the user writes in.
        You can help with a wide range of topics — from general knowledge,
        daily tasks, recommendations, to casual conversation.
        When unsure, be honest and suggest alternatives.
      first_message: "Hello! How can I help you today?"

    - name: cs
      description: "A polite, empathetic, and solution-oriented customer service agent"
      personality: "polite, empathetic, solution-oriented, professional"
      system_prompt: |
        You are a professional customer service representative.
        Always greet the customer warmly and address their concerns with empathy.
        Listen first, then provide clear solutions step by step.
        If you cannot resolve the issue, escalate politely — never leave
        the customer without a next step.
        Stay calm and positive even with frustrated customers.
        Use formal but warm language. Avoid jargon.
        Always end with a confirmation — ask if the customer needs anything else.
        Always respond in the same language the user writes in.
      first_message: "Hello! Thank you for reaching out. How can I help you today?"

# LLM Configuration
llm:
  main: "anthropic"
  
  system_prompt: |
    You are a helpful and friendly AI assistant.
    Reply concisely and clearly. Always respond in the same language the user writes in.
  
  max_input_length: 10000
  timeout: 2m               # idle timeout per chunk during streaming
  max_context_chars: 250000 # max total chars sent to LLM; trims oldest messages if exceeded
  rate_limit: 10            # requests per minute per user
  
  # Anthropic (Claude)
  # Two modes:
  #   mode: "api" (default) — calls Anthropic API directly
  #   mode: "cli"           — uses `claude` CLI command (Pro/Max subscription, no key needed)
  #
  # API mode auth (choose one):
  #   api_key     → Anthropic API key, or env ANTHROPIC_API_KEY
  #   auth_token  → Claude OAuth token, or env CLAUDE_CODE_OAUTH_TOKEN (Pro/Max)
  #
  # CLI mode: requires `claude` installed and authenticated (claude login)
  anthropic:
    enabled: true
    mode: "api"      # "api" or "cli"
    api_key: ""      # API mode: Anthropic API key
    # auth_token: "" # API mode: Claude OAuth token (Pro/Max)
    # cli_path: ""   # CLI mode: path to claude binary (default: "claude")
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.7

  # OpenAI (GPT)
  openai:
    enabled: false
    api_key: ""  # or env: OPENAI_API_KEY
    model: "gpt-4o"
    max_tokens: 4096
    temperature: 0.7
  
  # Google Gemini
  gemini:
    enabled: false
    api_key: ""  # or env: GOOGLE_API_KEY
    model: "gemini-1.5-pro"
    max_tokens: 4096
    temperature: 0.7
  
  # Zhipu GLM (ChatGLM)
  # Two modes:
  #   mode: "api" (default) — calls GLM API directly (requires api_key + base_url)
  #   mode: "cli"           — uses `claude` CLI command (Pro/Max subscription, no key needed)
  glm:
    enabled: false
    mode: "cli"      # "api" or "cli"
    api_key: ""  # or env: GLM_API_KEY
    model: "glm-4"
    max_tokens: 4096
    temperature: 0.7
    base_url: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
  
  # DeepSeek
  deepseek:
    enabled: false
    api_key: ""  # or env: DEEPSEEK_API_KEY
    model: "deepseek-chat"
    max_tokens: 4096
    temperature: 0.7
  
  # Kimi (Moonshot AI)
  # Two modes:
  #   mode: "api" (default) — calls Kimi API directly (requires api_key)
  #   mode: "cli"           — uses `claude` CLI command (Pro/Max subscription, no key needed)
  kimi:
    enabled: false
    mode: "cli"      # "api" or "cli"
    api_key: ""  # or env: KIMI_API_KEY
    model: "moonshot-v1-8k"
    max_tokens: 4096
    temperature: 0.7
  
  # Qwen (Alibaba DashScope)
  qwen:
    enabled: false
    api_key: ""  # or env: QWEN_API_KEY
    model: "qwen-turbo"
    max_tokens: 4096
    temperature: 0.7
  
  # MiniMax
  # Two modes:
  #   mode: "api" (default) — calls MiniMax API directly (requires api_key)
  #   mode: "cli"           — uses `claude` CLI command (Pro/Max subscription, no key needed)
  minimax:
    enabled: false
    mode: "cli"      # "api" or "cli"
    api_key: ""  # or env: MINIMAX_API_KEY
    model: "abab6.5-chat"
    max_tokens: 4096
    temperature: 0.7

# Tools Configuration (100% FREE - no API keys required!)
tools:
  # Web Search
  # Primary: Brave API (if key provided)
  # Fallback: DuckDuckGo scraping (no key needed)
  search:
    enabled: true
    api_key: ""  # Optional: BRAVE_API_KEY for better results
  
  # Maps - Nominatim (OpenStreetMap) - 100% free
  maps:
    enabled: true
    # No API key needed!
  
  # Weather - wttr.in - 100% free
  weather:
    enabled: true
    # No API key needed!
  
  # Web Scraper - Colly (lightweight browser alternative)
  scraper:
    enabled: true
    # Scrape any website, extract text, links, images
    # No API key needed!

# Agent Sessions (coding agents: claude, codex, gemini)
agent:
  timeout: 5m             # per-attempt timeout
  max_retries: 2          # auto-retry on timeout
  session_timeout: 6h     # idle session timeout (0s = disabled)
  discover_depth: 3       # auto-discover directory search depth (default 3)
  # shortcuts:            # custom directory shortcuts
  #   myproject: "~/code/myproject"
  #   backend: "~/code/myapp/backend"
